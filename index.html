<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>First Brainstorm</title>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header"> <!-- ID Selector -->
        <h1>Weekly Team Meeting</h1>
        <p class="subtitle">Topic: Brainstorming</p> <!-- Class Selector -->
        <p>Date: April 8, 2026</p>
    </header>
    <main>
        <section class="content-box"> <!-- Combining Two Selectors -->
            <h2>Attendance</h2>
            <ul class="attendance-list">
                <li>Teammate1 - Present</li>
                <li>Teammate2 - Present</li>
                <li data-status="absent">Teammate1 - Absent</li> <!-- Attribute Selector -->
            </ul>
        </section>
        <section class="content-box">
            <h2>Meeting Agenda</h2>
            <p>brainstorming, team logistics</p>
        </section>
        <section>
            <h2>Media Gallery</h2>
            <img src="example.png" alt="demo image" width="600" height="400">
            <h3>Video Content</h3>
            <video width="640" height="360" controls>
                <source src="CAT3CYOAAdch1.mp4" type="video/mp4">
            </video>
            <h3>Audio Content</h3>
            <audio controls>
                <source src="faaah.mp3" type="audio/mpeg">
            </audio>
        </section>
    </main>
</body>
</html>
